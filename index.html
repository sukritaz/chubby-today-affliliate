<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <!-- set theme before first paint to avoid a flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var d = t ? t === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
          if (d) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <title>my corner of the internet</title>
    <meta name="description" content="A personal link page — apps, gear, and the stuff that keeps me moving." />
    <meta property="og:title" content="my corner of the internet" />
    <meta property="og:description" content="A personal link page — apps, gear, and the stuff that keeps me moving." />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.1.0/dist/tabler-icons.min.css"
    />

    <!-- GoatCounter analytics (privacy-friendly, no cookies). Counts page views
         automatically; link clicks are sent as events from ProductCard. -->
    <script
      data-goatcounter="https://chubbytoday.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
